<script>
/* Plotly measures each chart's container for its initial width, but closeread
   rebuilds the page grid on DOMContentLoaded *after* that, leaving the plot
   drawn narrower than its (now full-width) container and left-aligned. Re-fit
   every Plotly chart once the layout has settled, and again whenever a tab is
   shown, so charts always fill their sticky panel. */
(function () {
  function fit() {
    if (!window.Plotly) return;
    document.querySelectorAll('.plotly-graph-div').forEach(function (d) {
      try { window.Plotly.Plots.resize(d); } catch (e) {}
    });
  }
  function fitSoon() { [60, 250, 600, 1200].forEach(function (t) { setTimeout(fit, t); }); }
  if (document.readyState === 'complete') fitSoon();
  else window.addEventListener('load', fitSoon);
  document.addEventListener('shown.bs.tab', fitSoon, true);
}());

/* Closeread -> map scroll bridge. Each tagged narrative paragraph carries a
   data-cr-zoom value ("hawthorn", "frankston", or "reset"). As the reader
   scrolls a tagged paragraph into the centre band of the viewport, we postMessage
   the suburb into the Folium map iframe, which flies to that suburb's boundary.
   The Leaflet map can't be driven by closeread's CSS-transform effects directly,
   so this message bridge reaches inside the iframe instead. */
(function () {
  function postZoom(suburb) {
    var frame = document.querySelector('iframe.cr-map');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'cr-zoom', suburb: suburb }, '*');
    }
  }
  function initZoomBridge() {
    var triggers = document.querySelectorAll('[data-cr-zoom]');
    if (!triggers.length || !('IntersectionObserver' in window)) return;
    var current = null;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        var suburb = e.target.getAttribute('data-cr-zoom');
        if (suburb && suburb !== current) { current = suburb; postZoom(suburb); }
      });
    }, { rootMargin: '-45% 0px -45% 0px', threshold: 0 });
    triggers.forEach(function (t) { io.observe(t); });
  }
  if (document.readyState === 'complete') initZoomBridge();
  else window.addEventListener('load', initZoomBridge);
}());

/* Closeread -> Plotly geo scroll bridge. Same idea as the Folium bridge above,
   but the bubble map is an inline Plotly Scattergeo rather than an iframe, so we
   can't postMessage into it. Instead each tagged paragraph carries a
   data-cr-geozoom value ("brisbane", "reset", ...). As it scrolls into the centre
   band we Plotly.relayout the bubble-map's geo lat/lon ranges to that named
   bounding box, the geo equivalent of Leaflet's flyToBounds. */
(function () {
  var GEO_BOUNDS = {
    /* [South, North] lat and [West, East] lon — a box framing each focus. */
    reset:    { lat: [-45, -10],     lon: [110, 155] },
    brisbane: { lat: [-29.5, -25.5], lon: [150.5, 155.5] }
  };
  function geoZoom(name) {
    var b = GEO_BOUNDS[name] || GEO_BOUNDS.reset;
    var div = document.querySelector('#cr-bubble-map .plotly-graph-div');
    if (!div || !window.Plotly) return;
    window.Plotly.relayout(div, {
      'geo.lataxis.range': b.lat,
      'geo.lonaxis.range': b.lon
    });
  }
  function initGeoBridge() {
    var triggers = document.querySelectorAll('[data-cr-geozoom]');
    if (!triggers.length || !('IntersectionObserver' in window)) return;
    var current = null;
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        var name = e.target.getAttribute('data-cr-geozoom');
        if (name && name !== current) { current = name; geoZoom(name); }
      });
    }, { rootMargin: '-45% 0px -45% 0px', threshold: 0 });
    triggers.forEach(function (t) { io.observe(t); });
  }
  if (document.readyState === 'complete') initGeoBridge();
  else window.addEventListener('load', initGeoBridge);
}());
</script>
